<body>
    <header>
        <h1>VIVE LA VIE</h1>

    <main>
        A stylised hand-brushed script font loosely based on the famous Coldplay album.

        <h2><a target="_blank" 
            href="https://github.com/HEofOttoman/Viva-La-Vie-Font/releases/download/v1.0.1/V1-ViveLaVie-Regular.zip" 
            download="V1-ViveLaVie-Regular.zip">DOWNLOAD (V1)
        </a></h2>

        <section>
            <h3 contenteditable="true">TRY WRITING SOMETHING! (CLICK ME)</click></h3>
            <script>
                const fontTextInput = document.getElementById('font-text-input');
                const fontTextOutput = document.getElementById('font-text-output');

                fontTextInput.addEventListener('input', (event) => {
                    const currentText = event.target.textContent;
                    
                    fontTextOutput.textContent = currentText;
                });

            </script>
        </section>
    
    </main>
