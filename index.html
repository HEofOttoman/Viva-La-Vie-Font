        <section>
            <h3 contenteditable="plaintext-only">TRY WRITING SOMETHING IN THIS HEADER! (CLICK ME)</click></h3>

        </section>
    
    </main>

    <!-- Thanks jaxstellar (modified from max's site) -->
    <div id="starfield"></div>
    <script>
        const field = document.getElementById('starfield');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() < 0.8 ? Math.random() * 1.5 + 0.5 : Math.random() * 2.5 + 1;
            star.style.cssText = `
                width:${size}px; height:${size}px; left:${Math.random()*100}%; top:${Math.random()*100}%; --dur:${2.5 + Math.random()*4}s; 
                --delay:${Math.random()*5}s; --bright:${0.3 + Math.random()*0.6};
            `;
            if (Math.random() < 0.08) { star.style.background = '#907B4C' };
            field.appendChild(star);
        }

    </script>
